# 로컬 dev: 멀티 테넌트 인증 불필요
auth_enabled: false

server:
  http_listen_port: 3100
  # gRPC는 클러스터 내부 통신용. 단일 인스턴스이므로 0으로 설정해 비활성화
  grpc_listen_port: 9096

common:
  # 모든 데이터를 로컬 파일시스템에 저장 (S3/GCS 등 오브젝트 스토리지 불필요)
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  # 단일 인스턴스이므로 복제 불필요
  replication_factor: 1
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      # 분산 KV 스토어(etcd/consul) 대신 메모리 사용 (단일 인스턴스 전용)
      store: inmemory

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        # Grafana에서 같은 시간 범위를 반복 쿼리할 때 응답 속도 향상
        max_size_mb: 100

schema_config:
  configs:
    - from: 2024-01-01
      # tsdb: v3 기본 인덱스. v2의 boltdb_shipper 대비 쿼리 성능 향상 + 디스크 효율
      store: tsdb
      object_store: filesystem
      # v13: Loki 3.x 권장 스키마 버전
      schema: v13
      index:
        prefix: index_
        # 24h 단위 인덱스 파일: 로컬 dev에서 파일 수 관리하기 쉬운 단위
        period: 24h

limits_config:
  reject_old_samples: true
  # 7일 이전 로그도 허용: 개발 중 서버 재시작이나 로그 재전송 시 거부되지 않도록
  reject_old_samples_max_age: 168h
  # Loki v3 신기능: 구조화된 메타데이터(key=value) 로그 지원
  allow_structured_metadata: true
  # Grafana Explore Logs에서 시간대별 로그 볼륨 시각화 활성화
  volume_enabled: true

compactor:
  working_directory: /loki/compactor
  # 10분마다 오래된 청크 압축 → 디스크 공간 효율화
  compaction_interval: 10m
