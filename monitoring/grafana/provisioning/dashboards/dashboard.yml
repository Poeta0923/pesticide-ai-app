apiVersion: 1

# 파일 시스템의 JSON 파일을 자동으로 대시보드로 로드하는 프로바이더 설정
providers:
  - name: "pesticide-dashboards"
    orgId: 1
    type: file
    # false: UI에서 대시보드 삭제 허용 (로컬 dev 편의)
    disableDeletion: false
    # 10초마다 파일 변경 감지 → Grafana 재시작 없이 대시보드 반영
    updateIntervalSeconds: 10
    # true: UI에서 수정 후 저장 가능 (커스터마이징 용이)
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      # 하위 디렉토리를 Grafana 폴더로 자동 매핑
      # 예: dashboards/nestjs/*.json → "nestjs" 폴더에 대시보드 생성
      foldersFromFilesStructure: true
